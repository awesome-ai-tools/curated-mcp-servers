<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#161b22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f78166;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="200" rx="10" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="700" cy="40" r="80" fill="#58a6ff" opacity="0.05"/>
  <circle cx="100" cy="160" r="60" fill="#f78166" opacity="0.05"/>
  <circle cx="650" cy="150" r="40" fill="#58a6ff" opacity="0.08"/>
  <!-- MCP Icon -->
  <g transform="translate(60, 55)">
    <rect x="0" y="0" width="90" height="90" rx="18" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
    <circle cx="25" cy="30" r="6" fill="#58a6ff"/>
    <circle cx="65" cy="30" r="6" fill="#f78166"/>
    <circle cx="45" cy="65" r="6" fill="#58a6ff"/>
    <line x1="25" y1="30" x2="65" y2="30" stroke="#58a6ff" stroke-width="1.5" opacity="0.5"/>
    <line x1="25" y1="30" x2="45" y2="65" stroke="#58a6ff" stroke-width="1.5" opacity="0.5"/>
    <line x1="65" y1="30" x2="45" y2="65" stroke="#f78166" stroke-width="1.5" opacity="0.5"/>
  </g>
  <!-- Title -->
  <text x="180" y="85" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="36" font-weight="700" fill="#e6edf3">Curated MCP Servers</text>
  <!-- Subtitle -->
  <text x="180" y="120" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#8b949e">The community-driven list of Model Context Protocol servers</text>
  <!-- Accent line -->
  <rect x="180" y="135" width="120" height="3" rx="1.5" fill="url(#accent)"/>
  <!-- Tags -->
  <g transform="translate(180, 155)">
    <rect x="0" y="0" width="55" height="22" rx="11" fill="#58a6ff" opacity="0.15"/>
    <text x="27.5" y="15" font-family="system-ui, sans-serif" font-size="11" fill="#58a6ff" text-anchor="middle">500+</text>
    <rect x="65" y="0" width="100" height="22" rx="11" fill="#f78166" opacity="0.15"/>
    <text x="115" y="15" font-family="system-ui, sans-serif" font-size="11" fill="#f78166" text-anchor="middle">PRs Welcome</text>
    <rect x="175" y="0" width="80" height="22" rx="11" fill="#58a6ff" opacity="0.15"/>
    <text x="215" y="15" font-family="system-ui, sans-serif" font-size="11" fill="#58a6ff" text-anchor="middle">MIT License</text>
  </g>
</svg>
