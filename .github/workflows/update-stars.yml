name: Update Star Counts

on:
  schedule:
    # Every Monday at midnight UTC
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stars:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch star counts and generate STARS.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          echo "Extracting GitHub repository URLs from README.md..."

          # Extract unique GitHub repo URLs (owner/repo) from README.md
          # Matches patterns like https://github.com/owner/repo
          grep -oP 'https://github\.com/[A-Za-z0-9._-]+/[A-Za-z0-9._-]+' README.md \
            | sed 's|https://github.com/||' \
            | sort -u \
            > /tmp/repos.txt

          echo "Found $(wc -l < /tmp/repos.txt) unique GitHub repositories"

          # Fetch star counts for each repo
          > /tmp/stars.tsv

          while IFS= read -r repo; do
            # Skip empty lines
            [ -z "$repo" ] && continue

            # Query the GitHub API for star count
            response=$(curl -s -w "\n%{http_code}" \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${repo}" 2>/dev/null)

            http_code=$(echo "$response" | tail -1)
            body=$(echo "$response" | sed '$d')

            if [ "$http_code" = "200" ]; then
              stars=$(echo "$body" | jq -r '.stargazers_count // 0')
              description=$(echo "$body" | jq -r '.description // "No description"' | head -c 120)
              echo -e "${stars}\t${repo}\t${description}" >> /tmp/stars.tsv
            else
              echo "Warning: Could not fetch data for ${repo} (HTTP ${http_code})" >&2
            fi

            # Rate limit: small delay between requests
            sleep 0.5
          done < /tmp/repos.txt

          echo "Successfully fetched star counts for $(wc -l < /tmp/stars.tsv) repositories"

          # Sort by star count (descending) and take top 50
          sort -t$'\t' -k1 -rn /tmp/stars.tsv | head -50 > /tmp/top_stars.tsv

          # Generate STARS.md
          cat > STARS.md << 'HEADER'
          # Top Starred MCP Servers

          This file is automatically generated by the [Update Star Counts](.github/workflows/update-stars.yml) workflow.
          It lists the top 50 most-starred GitHub repositories referenced in our curated list.

          > **Last updated:** <!-- DATE_PLACEHOLDER -->

          | Rank | Stars | Repository | Description |
          |------|-------|------------|-------------|
          HEADER

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' STARS.md

          # Replace date placeholder
          sed -i "s|<!-- DATE_PLACEHOLDER -->|$(date -u '+%Y-%m-%d %H:%M UTC')|" STARS.md

          # Append table rows
          rank=1
          while IFS=$'\t' read -r stars repo description; do
            # Escape pipe characters in description
            description=$(echo "$description" | sed 's/|/\\|/g')
            echo "| ${rank} | ${stars} | [${repo}](https://github.com/${repo}) | ${description} |" >> STARS.md
            rank=$((rank + 1))
          done < /tmp/top_stars.tsv

          echo "" >> STARS.md
          echo "---" >> STARS.md
          echo "*Generated automatically by GitHub Actions. Do not edit manually.*" >> STARS.md

          echo "STARS.md generated successfully with $((rank - 1)) entries"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet STARS.md 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add STARS.md
          git commit -m "Update STARS.md with latest star counts"
          git push
