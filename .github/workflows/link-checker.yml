name: Check Broken Links

on:
  schedule:
    # Every Sunday at midnight UTC
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check links in README.md
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,204,206,301,302,303,307,308,403,429
            --timeout 30
            --max-retries 3
            --max-concurrency 10
            --exclude-loopback
            README.md
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issue on broken links
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.existsSync('./lychee/out.md')
              ? fs.readFileSync('./lychee/out.md', 'utf8')
              : 'Broken links were detected but the report file was not found. Check the workflow run for details.';

            // Check for an existing open issue to avoid duplicates
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'broken-links',
              per_page: 1
            });

            const title = `Broken links detected (${new Date().toISOString().split('T')[0]})`;

            if (existingIssues.data.length > 0) {
              // Update the existing issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssues.data[0].number,
                title: title,
                body: `## Broken Links Report\n\nThis report was automatically generated by the link checker workflow.\n\n${body}`
              });
              console.log(`Updated existing issue #${existingIssues.data[0].number}`);
            } else {
              // Create a new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: `## Broken Links Report\n\nThis report was automatically generated by the link checker workflow.\n\n${body}`,
                labels: ['broken-links']
              });
              console.log('Created new broken links issue');
            }
